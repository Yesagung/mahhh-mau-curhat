<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pesan cinta untuk Mama - Halaman interaktif dengan efek visual yang menyentuh hati.">
<meta name="keywords" content="cinta, mama, pesan, interaktif, efek visual">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://images.unsplash.com">

<title>Untuk Mama ❤️ - Pesan Cinta Interaktif</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
  color: #f0f0f0;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* OPENING */
.opening {
  position: fixed;
  width: 100%;
  height: 100vh;
  cursor: pointer;
  z-index: 10;
  transition: opacity 1s ease;
}
.opening:hover {
  opacity: 0.8;
}
.opening img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.65;
  filter: brightness(0.7);
  transition: filter 0.5s ease;
}
.opening:hover img {
  filter: brightness(0.9);
}
.opening-text {
  position: absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:18px;
  letter-spacing:1px;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
  transition: text-shadow 0.3s ease;
}
.opening:hover .opening-text {
  text-shadow: 0 0 20px rgba(255,255,255,0.8);
}

/* MAIN */
.main { 
  opacity:0; 
  transform: translateY(50px);
  transition:2s ease;
}
.main.show { 
  opacity:1; 
  transform: translateY(0);
}

/* HEADER */
.header-img {
  width:100%;
  height:260px;
  object-fit:cover;
  opacity:0;
  transform:scale(1.05) translateY(20px);
  transition:2s ease;
  filter: brightness(0.65);
}
.header-img.show {
  opacity:1;
  transform:scale(1) translateY(0);
}

/* CONTAINER */
.container {
  max-width:720px;
  margin:auto;
  padding:50px 36px;
  position: relative;
}

/* 🔥 GARIS (DARK GLOW PROFESSIONAL) */
.container::before,
.container::after {
  content: "";
  position: absolute;
  top: 0;
  width: 3px;
  height: 100%;
  border-radius: 5px;

  background: linear-gradient(
    180deg,
    rgba(255,0,50,0.8),
    rgba(255,50,100,1),
    rgba(255,100,150,1),
    rgba(255,50,100,1),
    rgba(255,0,50,0.8)
  );

  background-size: 100% 400%;
  animation: flowVertical 12s linear infinite, pulse 6s ease-in-out infinite;
  filter: blur(0.5px);

  box-shadow:
    0 0 15px rgba(255,0,50,0.8),
    0 0 30px rgba(255,50,100,0.7),
    0 0 60px rgba(255,100,150,0.6),
    0 0 120px rgba(255,150,200,0.4);
}

/* SPACING BIAR NGGAK NEMPEL */
.container::before { left: 18px; }
.container::after { right: 18px; animation-delay:6s; }

/* ANIMATION */
@keyframes flowVertical {
  0% { background-position: 0% 0%; }
  100% { background-position: 0% 300%; }
}
@keyframes pulse {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}
/* FLYING PHOTOS */
.flying-photo {
  position: fixed;
  width: 75px;
  height: auto;
  opacity: 0.6;
  z-index: 2;
  animation: flyUp 25s linear infinite paused;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(255,255,255,0.2);
  filter: brightness(0.9) contrast(1.1);
  transition: transform 0.5s ease, box-shadow 0.5s ease;
  cursor: pointer;
}
.flying-photo:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(255,255,255,0.4);
}

@keyframes flyAcross {
  0% { left: -150px; top: 20%; transform: rotate(0deg); }
  25% { top: 30%; transform: rotate(90deg); }
  50% { top: 40%; transform: rotate(180deg); }
  75% { top: 50%; transform: rotate(270deg); }
  100% { left: 100vw; top: 60%; transform: rotate(360deg); }
}

@keyframes flyUp {
  0% { bottom: -100px; opacity: 0.3; transform: scale(0.8); }
  20% { opacity: 0.6; transform: scale(1); }
  80% { opacity: 0.6; transform: scale(1); }
  100% { bottom: 100vh; opacity: 0; transform: scale(0.8); }
}

/* TYPOGRAPHY */
h1 {
  font-family: 'Playfair Display', serif;
  text-align:center;
  margin-bottom:35px;
  font-size:30px;
  letter-spacing:1px;
  background: linear-gradient(45deg, #ff3c5c, #ff6b8a, #ffa0b4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 10px rgba(255,60,80,0.5);
}

p {
  font-size:16px;
  line-height:1.9;
  margin-bottom:24px;
  opacity:0;
  transform:translateY(30px) scale(0.95);
  transition:1.2s ease;
  text-shadow: 0 0 5px rgba(255,255,255,0.1);
}
p.show {
  opacity:1;
  transform:translateY(0) scale(1);
  text-shadow: 0 0 15px rgba(255,255,255,0.3);
}

/* ❤️ LOVE FLOAT (SLOW + PREMIUM) */
.heart {
  position: fixed;
  bottom: -20px;
  width: 8px;
  height: 8px;
  background: rgba(255,80,100,0.5);
  transform: rotate(45deg);
  animation: floatUp linear forwards;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 8px;
  height: 8px;
  background: rgba(255,80,100,0.5);
  border-radius: 50%;
}

.heart::before { top: -4px; }
.heart::after { left: -4px; }

@keyframes floatUp {
  0% { transform: translateY(0) rotate(45deg); opacity: 0.5;}
  100% { transform: translateY(-120vh) rotate(45deg); opacity: 0;}
}

/* RESPONSIVE */
@media(max-width:600px){
  .container { padding:40px 28px; }

  .container::before { left: 12px; }
  .container::after { right: 12px; }

  .header-img { height:200px; }
  h1 { font-size:26px; }

  .flying-photo { width: 60px; }
  .opening-text { font-size:16px; }
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" onclick="startApp()">
  <img src="./6.jpeg" loading="lazy">
  <div class="opening-text">klik pelan ya, Ma ❤️</div>
</div>

<!-- MUSIC -->
<audio id="music" src="./Budi Doremi - Ada Untukmu (Official Music Video) [SXHwgBTPhuQ].mp3" loop preload="auto"></audio>

<div class="main" id="main">
  <img src="./7.jpeg" class="header-img" id="header" loading="lazy">

  <div class="container">
    <h1>Untuk Mama</h1>
    <div id="content"></div>
  </div>
</div>

<!-- FLYING PHOTOS -->
<img src="./1.jpeg" class="flying-photo" loading="lazy">
<img src="./2.jpeg" class="flying-photo" loading="lazy">
<img src="./3.jpeg" class="flying-photo" loading="lazy">
<img src="./4.jpeg" class="flying-photo" loading="lazy">
<img src="./5.jpeg" class="flying-photo" loading="lazy">

<script>
function startApp(){
  document.querySelector(".opening").style.display="none";
  document.getElementById("main").classList.add("show");
  document.getElementById("header").classList.add("show");

  // Play music
  let music = document.getElementById("music");
  music.play();

  // Randomize flying photos
  let photos = document.querySelectorAll('.flying-photo');
  let positions = [10, 26, 42, 58, 74]; // Spaced horizontal positions to avoid overlap
  // Shuffle positions
  for (let i = positions.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [positions[i], positions[j]] = [positions[j], positions[i]];
  }
  photos.forEach((photo, i) => {
    photo.style.left = positions[i] + 'vw';
    // Start animation one by one
    setTimeout(() => {
      photo.style.animationPlayState = 'running';
    }, i * 15000); // 15 seconds apart
  });

  setTimeout(startTyping, 1000);
}

/* TEXT */
const paragraphs = [
`Halo mama tercinta, aku kangen banget ngobrol sama mama. Sebenernya aku pengen ngomong langsung, tapi karena lagi sibuk jadi aku sampaikan lewat ini dulu ya, Ma. Aku ngomong ini serius ya… aku punya keinginan besar untuk jadi anak yang sukses. Target aku ke depan juga besar banget, dan aku pengen bisa ngebanggain mama.`,

`Aku minta restu dan doa mama ya, supaya semua yang aku usahain bisa berjalan lancar. Aku bakal terus berusaha dan kerja keras setiap hari selagi aku masih kuat. Semua yang aku jalanin ini aku niatin buat masa depan, biar nanti aku bisa bantu mama juga. Hari ini aku juga baru nyelesaiin tanggung jawab yang sebenarnya bukan sepenuhnya kesalahan aku, sebesar 500 ribu.`,

`Lumayan capek sih, Ma, hehe… tapi aku anggap ini bagian dari proses. Ke depannya, aku lagi nyusun strategi. Penghasilan yang aku dapet bakal aku kumpulin per bulan, jadi kayak sistem gajian, terus aku rencanain buat tabungan dan investasi masa depan. Semoga nanti bisa jadi modal buat usaha, bahkan kalau bisa aku pengen bukain mama usaha juga.`,

`Untuk sekarang, aku masih butuh bantuan mama untuk ongkos harian, supaya penghasilan yang aku dapet bisa lebih cepat terkumpul tanpa kepake buat kebutuhan sehari-hari. Ma, satu lagi… cukup mama aja sama Erika yang tahu tujuan aku ini ya. Dan Ma, aku juga minta izin mulai hari ini aku pengen memperkenalkan diri aku sebagai Yesman, karena aku suka sama sosok Yesman yang udah tau resiko dan tanggung jawab.`,

`Aku gamau dipanggil Agung lagi sama orang baru, karena itu jadi pelajaran buat aku supaya lebih kuat dalam mengambil sikap. Aku cuma minta doa mama supaya aku selalu sehat, dilancarkan rezekinya, dan dikuatin dalam menjalani semua ini. Mama juga harus jaga kesehatan ya, Ma. Aku pengen mama selalu sehat dan nanti bisa ngerasain hasil dari kerja keras aku. Love you banyak mama ❤️`
];

let container = document.getElementById("content");
let pIndex=0, charIndex=0, currentP;

function startTyping(){ createParagraph(); }

function createParagraph(){
  if(pIndex>=paragraphs.length) return;

  currentP=document.createElement("p");
  container.appendChild(currentP);

  setTimeout(()=>currentP.classList.add("show"),150);
  typeChar();
}

function typeChar(){
  if(charIndex < paragraphs[pIndex].length){
    currentP.innerHTML += paragraphs[pIndex][charIndex];
    charIndex++;

    let delay = Math.random()*100 + 100;
    if(paragraphs[pIndex][charIndex] === ".") delay = 800;

    setTimeout(typeChar, delay);
  } else {
    pIndex++;
    charIndex=0;
    setTimeout(createParagraph, 1400);
  }
}

/* ❤️ LOVE EFFECT (SLOW & CLEAN) */
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";

  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(8+Math.random()*4)+"s";

  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),12000);
},900);
</script>

</body>
</html>
